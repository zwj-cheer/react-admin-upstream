name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  code-and-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: docker build -t react-admin-upstream:ci .
      - run: node scripts/verify-container.mjs react-admin-upstream:ci

  browser:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm e2e
      - run: pnpm visual
      - run: pnpm a11y
